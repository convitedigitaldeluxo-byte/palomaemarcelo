<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casamento Paloma & Marcelo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
  }

  /* Tela 1 — envelope, ocupa 100% da viewport, sem scroll */
  #screen1 {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    background: #111;
  }

  #screen1 img {
    height: 100vh;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }

  /* Botão invisível sobre o lacre */
  #sealBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 150px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    z-index: 101;
  }

  #sealBtn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(74,111,165,0.5);
    animation: ring 2s ease-out infinite;
  }

  @keyframes ring {
    0%   { transform: translate(-50%,-50%) scale(0.85); opacity: 0.9; }
    100% { transform: translate(-50%,-50%) scale(1.6);  opacity: 0; }
  }

  /* Tela 2 — scroll das páginas 2 e 3, oculta inicialmente */
  #screen2 {
    display: none;
    width: 100%;
    min-height: 100vh;
    overflow-y: auto;
    justify-content: center;
    background: #111;
  }

  #screen2.visible {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .page {
    width: 100%;
    max-width: 430px;
    position: relative;
  }

  .page img {
    width: 100%;
    display: block;
  }

  /* Áreas clicáveis invisíveis sobre os ícones */
  .icon-area {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 65%;
    z-index: 10;
  }

  .icon-area a {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

  <!-- TELA 1: ENVELOPE (fixa, trava scroll) -->
  <div id="screen1">
    <img src="https://raw.githubusercontent.com/convitedigitaldeluxo-byte/palomaemarcelo/main/1.png" alt="Convite">
    <button id="sealBtn" onclick="openInvite()"></button>
  </div>

  <!-- TELA 2: PÁGINAS 2 e 3 (oculta até clicar) -->
  <div id="screen2">

    <!-- PAGE 2: CASAL -->
    <div class="page">
      <img src="https://raw.githubusercontent.com/convitedigitaldeluxo-byte/palomaemarcelo/main/2.png" alt="Paloma e Marcelo">
    </div>

    <!-- PAGE 3: ICONS -->
    <div class="page" style="position:relative;">
      <img src="https://raw.githubusercontent.com/convitedigitaldeluxo-byte/palomaemarcelo/main/3.png?v=2" alt="Interações">

      <!-- Confirme presença -->
      <div class="icon-area" style="top:22%;height:20%;">
        <a href="https://noivos.casar.com/paloma-e-marcelo-2026-09-19/#/rsvp" target="_blank"></a>
      </div>

      <!-- Presentes -->
      <div class="icon-area" style="top:47%;height:18%;">
        <a href="https://noivos.casar.com/paloma-e-marcelo-2026-09-19/#/one-page/_start" target="_blank"></a>
      </div>

      <!-- Localização -->
      <div class="icon-area" style="top:70%;height:18%;">
        <a href="https://www.google.com/maps/search/Paróquia+Santo+Antônio+Praça+Cel.+Joaquim+Etsanislau+198+Sorocaba+SP" target="_blank"></a>
      </div>
    </div>

  </div>

<script>
  function openInvite() {
    // Esconde o envelope
    document.getElementById('screen1').style.display = 'none';

    // Libera o scroll e mostra as páginas
    document.documentElement.style.overflow = 'auto';
    document.body.style.overflow = 'auto';
    document.body.style.height = 'auto';

    var s2 = document.getElementById('screen2');
    s2.classList.add('visible');

    // Vai pro topo
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
